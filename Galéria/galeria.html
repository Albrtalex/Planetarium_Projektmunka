<!DOCTYPE html>
<html lang="hu">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Galéria</title>
</head>
<body>
    <div id="container">
        <div class="felirat">
            <h1>Galéria</h1>

            <div class="line-container">
            <svg viewBox="0 0 100 1" preserveAspectRatio="none">
                <line x1="0" y1="0.5" x2="100" y2="0.5" />
            </svg>
            </div>
        </div>

        <div class="kepek">

            <div class="row">
                <div class="card">
                    <div class="kep"><img src="../media/Planetarium.png" alt="Planetárium"></div>
                    <div class="cimek"><h2>A Planetárium főépülete és kupolája</h2></div>
                </div>           
                <div class="card">
                    <div class="kep"><img src="../media/the-surface-of-mars.png" alt="A mars felszíne"></div>
                    <div class="cimek"><h2>A Mars vörös sivatagi tája</h2></div>
                </div>
            </div>

            <div class="row">
                <div class="card">
                    <div class="kep"><img src="../media/szaturnusz.png" alt="Szaturnusz"></div>
                    <div class="cimek"><h2>A Szaturnusz és látványos gyűrűrendszere</h2></div>
                </div>
                <div class="card">
                    <div class="kep"><img src="../media/telescope.png" alt="Teleszkóp"></div>
                    <div class="cimek"><h2>Nagy teljesítményű obszervatóriumi távcső</h2></div>
                </div>
            </div>

            <div class="row">
                <div class="card">
                    <div class="kep"><img src="../media/Messier-16.webp" alt=""></div>
                    <div class="cimek"><h2>Pillars of creation</h2></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
